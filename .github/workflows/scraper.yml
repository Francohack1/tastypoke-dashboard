name: Scraper Tasty Poke

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch:          # tambien se puede lanzar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencias
        run: pip install requests beautifulsoup4

      - name: Ejecutar scraper
        run: python scraper.py ${{ secrets.GH_TOKEN }}

      - name: Commit data.json si cambio
        run: |
          git config user.name "Tasty Poke Bot"
          git config user.email "bot@tastypoke.com"
          git add data.json || true
          git diff --staged --quiet || git commit -m "Auto-update data.json $(date '+%Y-%m-%d %H:%M')"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
