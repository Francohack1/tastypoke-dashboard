<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasty Poke — Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8;--surface:#fffdf8;--surface2:#f0ebe0;--border:rgba(0,0,0,0.08);
  --ink:#1a1208;--ink-dim:rgba(26,18,8,0.45);--ink-muted:rgba(26,18,8,0.2);
  --teal:#00897b;--teal-dim:rgba(0,137,123,0.1);--teal-mid:rgba(0,137,123,0.3);
  --red:#c0392b;--red-dim:rgba(192,57,43,0.1);--gold:#b8860b;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:100}
header{padding:18px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:baseline;gap:8px}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:0.05em;color:var(--ink);line-height:1}
.logo-sub{font-size:0.62rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--teal);background:var(--teal-dim);padding:2px 8px;border-radius:3px}
.header-right{display:flex;align-items:center;gap:16px}
.status-pill{display:flex;align-items:center;gap:6px;font-size:0.68rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--teal);padding:4px 12px;background:var(--teal-dim);border:1px solid var(--teal-mid);border-radius:20px}
.pulse-dot{width:7px;height:7px;background:var(--teal);border-radius:50%;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
#clock{font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--ink-dim)}
.sync-btn{background:var(--ink);color:var(--bg);border:none;padding:7px 16px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px}
.sync-btn:hover{background:var(--teal)}
.spin{display:inline-block}
.syncing .spin{animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.last-sync{font-size:0.62rem;color:var(--ink-muted);font-family:'DM Mono',monospace;text-align:right}
.main{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;padding:28px;max-width:1400px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;animation:slideUp 0.5s ease both}
.card:nth-child(2){animation-delay:0.07s}.card:nth-child(3){animation-delay:0.14s}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card-head{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.card-label{font-size:0.58rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:3px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:0.04em;line-height:1}
.card-icon{font-size:1.4rem;opacity:0.5}
.card-body{padding:18px 22px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px;flex-shrink:0}
.badge-teal{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-mid)}
.billing-hero{display:flex;align-items:baseline;gap:5px;margin-bottom:4px}
.billing-amount{font-family:'Bebas Neue',sans-serif;font-size:3.6rem;line-height:1;color:var(--ink);letter-spacing:-0.01em}
.billing-currency{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--ink-dim)}
.billing-label{font-size:0.62rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:18px}
.billing-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.bstat{background:var(--surface2);border-radius:10px;padding:12px 8px;text-align:center}
.bstat-val{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:0.02em;line-height:1;margin-bottom:3px}
.bstat-lbl{font-size:0.58rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted)}
.billing-bars{display:flex;flex-direction:column;gap:9px}
.bbar-row{display:flex;align-items:center;gap:8px}
.bbar-name{width:68px;font-size:0.68rem;font-weight:500;color:var(--ink-dim);flex-shrink:0}
.bbar-track{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bbar-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(0.34,1.56,0.64,1)}
.bbar-val{width:42px;text-align:right;font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--ink-dim)}
.shift-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.shift-date{font-size:0.66rem;font-weight:600;color:var(--ink-dim);letter-spacing:0.04em}
.worker-list{display:flex;flex-direction:column;gap:8px}
.worker-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);transition:border-color 0.2s}
.worker-row:hover{border-color:var(--teal-mid)}
.worker-avatar{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:0.82rem;letter-spacing:0.05em;flex-shrink:0}
.worker-info{flex:1;min-width:0}
.worker-name{font-size:0.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.worker-shift{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--ink-muted);margin-top:1px}
.blocked-count{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1;color:var(--red);margin-bottom:2px}
.blocked-count-label{font-size:0.6rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:14px}
.blocked-list{display:flex;flex-direction:column;gap:7px}
.blocked-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);gap:8px}
.blocked-item.has-price{background:var(--red-dim);border-color:rgba(192,57,43,0.15)}
.blocked-name{font-size:0.78rem;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.blocked-price{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--ink-muted);flex-shrink:0}
.loading-row{height:40px;background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:9px;margin-bottom:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.source-tag{font-size:0.55rem;color:var(--ink-muted);font-family:'DM Mono',monospace;margin-top:12px;text-align:right;letter-spacing:0.05em}
footer{text-align:center;padding:14px;font-size:0.6rem;color:var(--ink-muted);letter-spacing:0.05em;font-family:'DM Mono',monospace;border-top:1px solid var(--border)}
@media(max-width:1000px){.main{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.main{grid-template-columns:1fr;padding:16px}header{padding:12px 16px;flex-wrap:wrap;gap:10px}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <span class="logo-main">🍣 Tasty Poke</span>
    <span class="logo-sub">Live</span>
  </div>
  <div class="header-right">
    <div class="status-pill"><div class="pulse-dot"></div>En vivo</div>
    <span id="clock">--:--:--</span>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
      <button class="sync-btn" onclick="syncAll()"><span class="spin">↻</span> Actualizar</button>
      <span class="last-sync" id="last-sync">—</span>
    </div>
  </div>
</header>

<div class="main">
  <div class="card">
    <div class="card-head">
      <div><div class="card-label">Módulo 01</div><div class="card-title">Facturación</div></div>
      <span class="card-icon">💶</span>
    </div>
    <div class="card-body" id="billing-body"><div class="loading-row"></div><div class="loading-row" style="opacity:.5"></div></div>
  </div>
  <div class="card">
    <div class="card-head">
      <div><div class="card-label">Módulo 02</div><div class="card-title">Quién trabaja hoy</div></div>
      <span class="card-icon">👥</span>
    </div>
    <div class="card-body" id="workers-body"><div class="loading-row"></div><div class="loading-row" style="opacity:.5"></div></div>
  </div>
  <div class="card">
    <div class="card-head">
      <div><div class="card-label">Módulo 03</div><div class="card-title">Productos bloqueados</div></div>
      <span class="card-icon">🚫</span>
    </div>
    <div class="card-body" id="blocked-body"><div class="loading-row"></div><div class="loading-row" style="opacity:.5"></div></div>
  </div>
</div>

<footer>TASTY POKE MATARÓ · Datos actualizados cada 5 min via GitHub Actions · Fuentes: Ágora · Google Sheets · Zuplyit</footer>

<script>
const COLORS=[{bg:'#e8f5e9',c:'#2e7d32'},{bg:'#e3f2fd',c:'#1565c0'},{bg:'#fce4ec',c:'#880e4f'},{bg:'#fff3e0',c:'#e65100'},{bg:'#f3e5f5',c:'#6a1b9a'},{bg:'#e0f2f1',c:'#00695c'}];

setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);

function renderBilling(b){
  const el=document.getElementById('billing-body');
  const mes=b.mes||1;
  el.innerHTML=`
    <div class="billing-hero"><span class="billing-currency">€</span><span class="billing-amount" id="bamt">0</span></div>
    <div class="billing-label">Ventas hoy · ${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
    <div class="billing-stats">
      <div class="bstat"><div class="bstat-val" style="color:var(--teal)">${b.tickets||0}</div><div class="bstat-lbl">Tickets</div></div>
      <div class="bstat"><div class="bstat-val" style="color:var(--gold)">€${b.ticket_medio||0}</div><div class="bstat-lbl">T. medio</div></div>
      <div class="bstat"><div class="bstat-val" style="color:var(--ink-dim)">${Math.round((b.ventas_hoy||0)/mes*100)}%</div><div class="bstat-lbl">Del mes</div></div>
    </div>
    <div class="billing-bars">
      <div class="bbar-row"><div class="bbar-name">Hoy</div><div class="bbar-track"><div class="bbar-fill" style="width:0%;background:var(--teal)" data-w="${Math.min(Math.round((b.ventas_hoy||0)/mes*100),100)}"></div></div><div class="bbar-val">€${b.ventas_hoy||0}</div></div>
      <div class="bbar-row"><div class="bbar-name">Semana</div><div class="bbar-track"><div class="bbar-fill" style="width:0%;background:var(--gold)" data-w="${Math.min(Math.round((b.semana||0)/mes*100),100)}"></div></div><div class="bbar-val">€${(b.semana||0).toLocaleString('es-ES')}</div></div>
      <div class="bbar-row"><div class="bbar-name">Mes</div><div class="bbar-track"><div class="bbar-fill" style="width:0%;background:var(--ink-muted)" data-w="100"></div></div><div class="bbar-val">€${(b.mes||0).toLocaleString('es-ES')}</div></div>
    </div>
    <div class="source-tag">↗ Ágora</div>`;
  let n=0,end=b.ventas_hoy||0,step=end/40;
  const t=setInterval(()=>{n=Math.min(n+step,end);const e=document.getElementById('bamt');if(e)e.textContent=Math.round(n).toLocaleString('es-ES');if(n>=end)clearInterval(t);},25);
  setTimeout(()=>document.querySelectorAll('.bbar-fill').forEach(e=>e.style.width=e.dataset.w+'%'),100);
}

function renderWorkers(workers){
  const el=document.getElementById('workers-body');
  if(!workers||!workers.length){el.innerHTML='<p style="font-size:.75rem;color:var(--ink-muted)">Sin datos de horario hoy</p>';return;}
  const today=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  el.innerHTML=`
    <div class="shift-header">
      <span class="shift-date">${today.charAt(0).toUpperCase()+today.slice(1)}</span>
      <span class="badge badge-teal">↗ ${workers.length} activos</span>
    </div>
    <div class="worker-list">
      ${workers.map((w,i)=>{const c=COLORS[i%COLORS.length];const ini=w.nombre.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
        return `<div class="worker-row"><div class="worker-avatar" style="background:${c.bg};color:${c.c}">${ini}</div><div class="worker-info"><div class="worker-name">${w.nombre}</div><div class="worker-shift">${w.entrada} → ${w.salida}</div></div><div style="font-size:0.8rem">🟢</div></div>`;
      }).join('')}
    </div>
    <div class="source-tag">↗ Google Sheets</div>`;
}

function renderBlocked(items){
  const el=document.getElementById('blocked-body');
  const count=items?.length||0;
  el.innerHTML=`
    <div class="blocked-count">${count}</div>
    <div class="blocked-count-label">producto${count!==1?'s':''} desactivado${count!==1?'s':''}</div>
    <div class="blocked-list">
      ${(items||[]).map(p=>`<div class="blocked-item ${p.precio&&p.precio!=='€0.00'?'has-price':''}">
        <span class="blocked-name">🚫 ${p.nombre}</span>
        <span class="blocked-price">${p.precio||''}</span>
      </div>`).join('')}
    </div>
    <div class="source-tag">↗ Zuplyit</div>`;
}

let syncing=false;
async function syncAll(){
  if(syncing)return;
  syncing=true;
  const btn=document.querySelector('.sync-btn');
  btn.classList.add('syncing');btn.disabled=true;
  ['billing-body','workers-body','blocked-body'].forEach(id=>{
    document.getElementById(id).innerHTML='<div class="loading-row"></div><div class="loading-row" style="opacity:.5;margin-top:8px"></div>';
  });
  try{
    // Leer data.json desde GitHub (con cache-bust)
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('no data.json');
    const d=await r.json();
    renderBilling(d.billing||{});
    renderWorkers(d.workers||[]);
    renderBlocked(d.blocked||[]);
    const ts=d.updated_at||new Date().toLocaleTimeString('es-ES');
    document.getElementById('last-sync').textContent='datos: '+ts;
  }catch(e){
    console.error(e);
    // Fallback datos hardcodeados si aun no hay data.json
    renderBilling({ventas_hoy:443,tickets:19,ticket_medio:23,semana:6134,mes:19160});
    renderWorkers([{nombre:'Stephanie',entrada:'9:00am',salida:'5:00pm'},{nombre:'Tarik',entrada:'1:30pm',salida:'11:30pm'}]);
    renderBlocked([{nombre:'Veggies Bang',precio:'€4.30'},{nombre:'Berries Boom',precio:'€4.30'},{nombre:'Mango Passion',precio:'€4.30'},{nombre:'Fanta Limón',precio:'€3.00'},{nombre:'Fresas',precio:'€0.00'},{nombre:'Extra Arándanos',precio:'€0.00'}]);
    document.getElementById('last-sync').textContent='fallback';
  }
  btn.classList.remove('syncing');btn.disabled=false;syncing=false;
}

syncAll();
// Auto-refresh cada 5 minutos (sincronizado con el scraper)
setInterval(syncAll,5*60*1000);
</script>
</body>
</html>
